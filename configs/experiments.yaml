dataset:
  root: ${FISHDETECT_DATASET_ROOT}
  prepared_root: ${FISHDETECT_PREPARED_ROOT}
  split_seed: 23401
  train: 0.70
  val: 0.15
  test: 0.15
  stratify: true
  group_by: sha256
  link_images: true

training:
  imgsz: 1280
  epochs: 100
  batch: auto
  patience: 25
  workers: 4
  device: auto
  amp: true
  smoke_test: false
  max_images:
  skip_network_weight_downloads_in_smoke: true
  allow_remote_weight_downloads: false

augmentation:
  hsv: true
  scale: true
  mosaic: true
  flipud: false
  fliplr: true
  underwater_color_jitter: true
  mild_blur: true
  haze_noise: true

imbalance:
  warn_rare_below: 5
  oversample: false
  weighted_sampling: false
  rare_class_augmentation: false
  k_fold:
    enabled: false
    folds: 5

experiment_groups:
  smoke:
    - yolo8n_det
  first_pass:
    - yolo8n_det
    - yolo8s_det
    - yolo10n_det
    - yolo11n_det
    - yolo12n_det
  main_comparison:
    - yolo8s_det
    - yolo9s_det
    - yolo10s_det
    - yolo11s_det
    - yolo12s_det
  capacity_check:
    - yolo8m_det
    - yolo9m_det
    - yolo10m_det
    - yolo11m_det
    - yolo12m_det
  extended:
    - yolo8n_det
    - yolo8s_det
    - yolo8m_det
    - yolo9t_det
    - yolo9s_det
    - yolo9m_det
    - yolo10n_det
    - yolo10s_det
    - yolo10m_det
    - yolo11n_det
    - yolo11s_det
    - yolo11m_det
    - yolo12n_det
    - yolo12s_det
    - yolo12m_det
    - rtdetr_l_det

experiments:
  - name: yolo8n_det
    family: yolo
    model: yolov8n.pt
    task: detect
  - name: yolo8s_det
    family: yolo
    model: yolov8s.pt
    task: detect
  - name: yolo8m_det
    family: yolo
